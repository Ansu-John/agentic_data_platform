name: Deploy Phase 2 - Data Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02-data-pipeline/**'
      - ".github/workflows/deploy-phase2.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02-data-pipeline/**'
      - ".github/workflows/deploy-phase2.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 'terraform/environments/dev/02-data-pipeline'
  AWS_REGION: 'ap-south-1'
  PROJECT: 'dataplatform'
  ENVIRONMENT: 'dev'
  TF_VAR_image_tag: ${{ github.sha }}

jobs:
  # ===================================================================
  # 1. QUALITY ASSURANCE & DRY RUN
  # Runs on PRs and Pushes. Fails the build if syntax or state is broken.
  # ===================================================================
  validate-and-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -diff

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # Only generate the speculative plan if this is a Pull Request
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan

  # ===================================================================
  # 2. EXECUTION & ARTIFACT BUILD
  # Runs ONLY when code is successfully merged into the 'main' branch.
  # ===================================================================
  apply:
    needs: validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Provision ECR Repository First (Targeted Apply)
        env:
          TF_LOG: DEBUG
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -target="aws_ecr_repository.spark_repo" -target="aws_ecr_repository.dq_agent_repo" -auto-approve -input=false
          
      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-spark-jobs
          IMAGE_TAG: ${{ github.sha }}
        working-directory: src/spark
        run: |
          # 1. Build the image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # 2. VERIFICATION CHECK: Bypass EMR entrypoint and list /home/hadoop contents
          echo "Verifying contents of /home/hadoop in the built image:"
          docker run --rm --entrypoint /bin/bash $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -c "ls -la /home/hadoop"
          
          # 3. VERIFICATION CHECK: Check for the Python script
          docker run --rm --entrypoint /bin/bash $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -c "ls -la /home/hadoop/raw_to_iceberg.py"
          
          # 4. Push the image
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
      - name: Force Stop EMR App for Terraform Update
        env:
          APP_NAME: "${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-spark-engine"
        run: |
          # Find the app ID
          APP_ID=$(aws emr-serverless list-applications --query "applications[?name=='$APP_NAME'].id" --output text)
          
          if [ "$APP_ID" != "None" ] && [ -n "$APP_ID" ]; then
            STATE=$(aws emr-serverless get-application --application-id $APP_ID --query "application.state" --output text)
            if [ "$STATE" == "STARTED" ] || [ "$STATE" == "STARTING" ]; then
              echo "Application is $STATE. Stopping it to allow Terraform updates..."
              aws emr-serverless stop-application --application-id $APP_ID
              
              # Wait for it to fully stop (checking every 10 seconds)
              while true; do
                CURRENT_STATE=$(aws emr-serverless get-application --application-id $APP_ID --query "application.state" --output text)
                if [ "$CURRENT_STATE" == "STOPPED" ]; then
                  echo "Application successfully stopped."
                  break
                fi
                echo "Still stopping... current state is $CURRENT_STATE"
                sleep 10
              done
            else
              echo "Application is already stopped or stopping ($STATE)."
            fi
          fi

      - name: Provision Remaining Infrastructure
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve