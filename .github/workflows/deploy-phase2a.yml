name: Deploy Phase 2a - Ingestion & Catalog

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02a-ingestion-catalog/**'
      - 'terraform/modules/glue_catalog/**'
      - 'terraform/modules/lambda_ingest/**'
      - 'src/lambda/ingest_trigger/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02a-ingestion-catalog/**'
      - 'terraform/modules/glue_catalog/**'
      - 'terraform/modules/lambda_ingest/**'
      - 'src/lambda/ingest_trigger/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 'terraform/environments/dev/02a-ingestion-catalog'
  AWS_REGION: 'ap-south-1'

jobs:
  validate-and-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format & Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform fmt -check
          terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan

  apply:
    needs: validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve