name: Deploy Phase 2b - EMR Compute & Orchestration

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02b-emr-compute/**'
      - 'terraform/modules/emr_serverless/**'
      - 'src/spark/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'terraform/environments/dev/02b-emr-compute/**'
      - 'terraform/modules/emr_serverless/**'
      - 'src/spark/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: 'terraform/environments/dev/02b-emr-compute'
  AWS_REGION: 'ap-south-1'
  PROJECT: 'dataplatform'
  ENVIRONMENT: 'dev'

jobs:
  validate-and-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format & Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform fmt -check
          terraform validate

  apply:
    needs: validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Provision ECR Repository First (Targeted Apply)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -target="module.emr_serverless.aws_ecr_repository.spark_repo" -auto-approve

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-spark-jobs
          IMAGE_TAG: latest
        working-directory: src/spark
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Provision Remaining Infrastructure (EMR & Step Functions)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve