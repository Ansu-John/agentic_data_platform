name: Deploy Phase 3 - AI Governance Platform

on:
  push:
    branches: ["main"]
    paths:
      - "src/agent/**"
      - "terraform/environments/dev/03-ai-dq-agent/**"
      - ".github/workflows/deploy-phase3.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: "dataplatform-ai-dq-agent"
  TF_WORKING_DIR: "terraform/environments/dev/03-ai-dq-agent"
  AWS_ROLE_ARN: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role"

jobs:
  validate-and-test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "src/agent/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: src/agent
        run: |
          uv sync --frozen

      - name: Type Checking (MyPy)
        working-directory: .
        run: src/agent/.venv/bin/mypy src/agent --strict
        
      - name: Linting (Ruff)
        working-directory: src/agent
        run: uv run ruff check .

      - name: Run Integration & Unit Tests
        working-directory: .
        env:
          PYTHONPATH: .
        run: src/agent/.venv/bin/pytest tests/ -v

  deploy-infrastructure-and-app:
    name: Enterprise Multi-Step Deployment
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # PHASE 1: Build ONLY the ECR Repository first
      - name: Terraform Target (ECR Repository)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -target=module.ai_dq_agent_compute.aws_ecr_repository.main -auto-approve

      # PHASE 2: Build and Push the Docker Image
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f src/agent/Dockerfile \
            -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      # PHASE 3: Deploy the rest of the infrastructure using the real, private image
      - name: Terraform Apply (Full Infrastructure)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          # This environment variable fulfills the required Terraform variable automatically
          TF_VAR_agent_ecr_image_uri: ${{ steps.build-image.outputs.image_uri }}
        run: terraform apply -auto-approve